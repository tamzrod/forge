#-------------------------------------------------------------------------------
# Capability Definitions
#-------------------------------------------------------------------------------
# These capabilities are available after Phase 0 initialization completes.
#-------------------------------------------------------------------------------
capabilities:

  - name: assessment
    description: Repository compliance assessment
    phase: Verification
    entrypoint: "Run KDSE"
    dependencies: []
    required_knowledge:
      - core-principles
      - engineering-model
      - chain-of-authority
    workflow_steps:
      - Initialize
      - Verify Standards
      - Assess Repository
      - Generate Report
      - Await Approval

  - name: architecture
    description: Architecture design and review
    phase: Knowledge → Architecture
    entrypoint: "Engineering Phase"
    dependencies:
      - assessment
    required_knowledge:
      - engineering-model
      - chain-of-authority

  - name: implementation
    description: Implementation guidance
    phase: Architecture → Implementation
    entrypoint: "Engineering Phase"
    dependencies:
      - architecture
    required_knowledge:
      - engineering-model

  - name: verification
    description: Implementation verification
    phase: Implementation → Verification
    entrypoint: "Verification Phase"
    dependencies:
      - implementation
    required_knowledge:
      - chain-of-authority

  - name: evolution
    description: Methodology evolution
    phase: Evolution
    entrypoint: "Evolution Phase"
    dependencies:
      - verification
    required_knowledge:
      - engineering-model

  - name: feedback
    description: Feedback collection
    phase: All
    entrypoint: "Session Protocol"
    dependencies: []
    required_knowledge: []

  - name: debugging
    description: Evidence-driven debugging workflow
    phase: Runtime
    entrypoint: "kdse debug init"
    dependencies: []
    required_knowledge:
      - debug-runtime

  - name: evidence_collection
    description: Structured evidence collection with types and tags
    phase: Runtime
    entrypoint: "kdse debug collect"
    dependencies:
      - debugging
    required_knowledge:
      - debug-runtime

  - name: root_cause_analysis
    description: Confidence-driven root cause analysis
    phase: Runtime
    entrypoint: "kdse debug select"
    dependencies:
      - debugging
      - evidence_collection
    required_knowledge:
      - debug-runtime

#-------------------------------------------------------------------------------
# Command Registry Summary
#-------------------------------------------------------------------------------
# Commands available after Phase 0 initialization.
# Full command definitions in runtime/install/commands.yaml.
#-------------------------------------------------------------------------------
commands:

  session_management:
    - Run KDSE
    - Continue KDSE
    - Close KDSE

  session_control:
    - Pause KDSE
    - Resume KDSE

  information:
    - KDSE Status
    - KDSE Report
    - KDSE Progress
    - KDSE Scores
    - KDSE Findings
    - KDSE History

  decisions:
    - Approve
    - Reject
    - Defer

  administration:
    - kdse install
    - kdse update
    - kdse verify
    - kdse uninstall

  debugging:
    - kdse debug init
    - kdse debug collect
    - kdse debug hypothesis
    - kdse debug evaluate
    - kdse debug confidence
    - kdse debug select
    - kdse debug report
    - kdse debug next
    - kdse debug state
    - kdse debug evidence
    - kdse debug hypotheses

#-------------------------------------------------------------------------------
# Workflow Entrypoints
#-------------------------------------------------------------------------------
workflows:

  run_session:
    command: "Run KDSE"
    description: "Start a new KDSE session"
    phases:
      - Phase 0: Initialize
      - Phase 1: Verify Standards
      - Phase 2: Assess Repository
      - Phase 3: Generate Report
      - Phase 4: Await Approval
      - Phase 5: Implement
      - Phase 6: Verify
      - Phase 7: Complete

  continue_session:
    command: "Continue KDSE"
    description: "Resume an existing session"
    phases:
      - Load Session State
      - Continue from Last Phase

  close_session:
    command: "Close KDSE"
    description: "End the current session"
    phases:
      - Finalize Report
      - Record Metrics
      - Close Session

#-------------------------------------------------------------------------------
# Initialization Configuration
#-------------------------------------------------------------------------------
initialization:
  bootstrap_timeout_seconds: 30
  max_retry_attempts: 3
  retry_delay_seconds: 1
  abort_on_missing_required: true
  verify_checksums: true
  generate_fingerprint: true
  load_optional_by_default: true

#-------------------------------------------------------------------------------
# Core Principles (for quick reference)
#-------------------------------------------------------------------------------
core_principles:
  - "Knowledge precedes architecture"
  - "Architecture precedes implementation"
  - "Implementation precedes verification"
  - "Knowledge is the longest-lived artifact"
  - "Engineering decisions must be traceable"
  - "Code realizes knowledge"
  - "Knowledge is language-independent"
  - "Authority flows downward"
  - "Verification confirms alignment"
  - "Evolution maintains authority"

#-------------------------------------------------------------------------------
# Authority Hierarchy
#-------------------------------------------------------------------------------
authority_hierarchy:
  highest: Knowledge
  hierarchy:
    - Knowledge
    - Architecture
    - Implementation
    - Verification
  lowest: Verification
  rule: "Lower layers cannot contradict higher layers"

#-------------------------------------------------------------------------------
# Engineering Lifecycle
#-------------------------------------------------------------------------------
lifecycle:
  stages:
    - Knowledge
    - Architecture
    - Implementation
    - Verification
    - Evolution
  flow: "Knowledge → Architecture → Implementation → Verification → Evolution"
