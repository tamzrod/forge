#===============================================================================
# KDSE Knowledge Manifest
#===============================================================================
# This manifest defines the knowledge required for KDSE Runtime initialization.
# Phase 0 loads this manifest and uses it to load all required knowledge.
# AI agents shall NOT guess which documents to load.
#===============================================================================

version: "1.0"
manifest_version: "1.0"
generated: "2026-07-11"

#-------------------------------------------------------------------------------
# Runtime Metadata
#-------------------------------------------------------------------------------
runtime:
  version: "1.0.0"
  minimum_version: "1.0.0"
  compatible_standard: ">= 1.0.0"
  knowledge_version: "1.0.0"

#-------------------------------------------------------------------------------
# Required Knowledge
#-------------------------------------------------------------------------------
# These documents MUST be loaded before any engineering activity begins.
# Loading order is explicitly defined - do not modify.
#-------------------------------------------------------------------------------
required_knowledge:

  - id: core-principles
    name: Core Principles
    version: "1.0"
    source: "docs/foundation/003-core-principles.md"
    priority: 1
    loading_order: 1
    description: |
      The 10 fundamental principles of Knowledge-Driven Software Engineering.
      These principles are timeless and govern all KDSE activities.
    capabilities:
      - principles
    checksum_required: true

  - id: engineering-model
    name: Engineering Model
    version: "1.0"
    source: "docs/foundation/004-engineering-model.md"
    priority: 1
    loading_order: 2
    description: |
      The five-stage engineering lifecycle: Knowledge, Architecture,
      Implementation, Verification, Evolution.
    capabilities:
      - lifecycle
    checksum_required: true

  - id: chain-of-authority
    name: Chain of Authority
    version: "1.0"
    source: "docs/foundation/006-chain-of-authority.md"
    priority: 1
    loading_order: 3
    description: |
      The authority hierarchy from Knowledge (highest) to Verification (lowest).
      Defines how authority flows and cannot be contradicted.
    capabilities:
      - authority
      - governance
    checksum_required: true

  - id: glossary
    name: Glossary
    version: "1.2"
    source: "docs/foundation/007-glossary.md"
    priority: 1
    loading_order: 4
    description: |
      Canonical terminology for KDSE. Each term has exactly one definition.
    capabilities:
      - terminology
    checksum_required: true

  - id: session-protocol
    name: Session Protocol
    version: "1.0"
    source: "runtime/SESSION_PROTOCOL.md"
    priority: 1
    loading_order: 5
    description: |
      Session lifecycle definition including phases, states, and transitions.
    capabilities:
      - session_management
    checksum_required: true

  - id: command-registry
    name: Command Registry
    version: "1.0"
    source: "runtime/install/commands.yaml"
    priority: 1
    loading_order: 6
    description: |
      Machine-readable registry of all KDSE Runtime commands.
    capabilities:
      - command_interface
    checksum_required: true

  - id: runtime-configuration
    name: Runtime Configuration
    version: "1.0"
    source: "runtime/VERSIONING.md"
    priority: 1
    loading_order: 7
    description: |
      Runtime versioning strategy and version compatibility policy.
    capabilities:
      - versioning
    checksum_required: true

